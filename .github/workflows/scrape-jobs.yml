name: Scrape Job Boards

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Scrape job boards
        timeout-minutes: 50
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
        run: python .github/scripts/scrape_jobs.py

      - name: Commit changes
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add .github/data/seen_jobs.json .github/data/title_classifications.json .github/data/gemini_usage.json listings.json README.md
          git diff --staged --quiet || git commit -m "x"
          git pull --rebase -X ours && git push
