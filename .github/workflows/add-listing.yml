name: Add Job Listing

on:
  issues:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  add-listing:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Process all approved issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/process_approved.py

      - name: Commit changes
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add README.md listings.json
          git diff --staged --quiet || git commit -m "x"
          git pull --rebase -X ours && git push
