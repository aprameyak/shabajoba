name: Check Links

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Check links
        run: python .github/scripts/check_links.py

      - name: Commit closed positions
        run: |
          git config user.name "Aprameya Kannan"
          git config user.email "aprameyakannan@gmail.com"
          git add README.md listings.json
          git diff --staged --quiet || git commit -m "x"
          git pull --rebase -X ours && git push
